<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hyodo | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #38bdf8;
            --text-main: #f8fafc;
            --text-sub: #94a3b8;
        }

        body {
            margin: 0;
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
        }

        /* 背景に動的なグラデーションを追加 */
        .hero {
            height: 60vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at top right, #1e3a8a, transparent),
                        radial-gradient(circle at bottom left, #4c1d95, transparent);
            text-align: center;
            padding: 0 20px;
        }

        h1 {
            font-size: 3.5rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .container {
            max-width: 900px;
            margin: -50px auto 50px;
            padding: 0 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        article {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        article:hover {
            transform: translateY(-10px);
            border-color: var(--accent-color);
        }

        h2 {
            color: var(--accent-color);
            font-size: 1.5rem;
        }

        p {
            color: var(--text-sub);
        }

        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 24px;
            background: var(--accent-color);
            color: var(--bg-color);
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            transition: opacity 0.3s;
        }

        .btn:hover {
            opacity: 0.8;
        }

        footer {
            text-align: center;
            padding: 40px;
            color: var(--text-sub);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <section class="hero">
        <h1>Hyodo's Digital Space</h1>
        <p>GitHub Pages & AI で創る、新しいWebの世界</p>
        <a href="https://github.com/hyodo925" class="btn">GitHub Profile</a>
    </section>

    <div class="container">
        <div class="grid">
            <article>
                <h2>Skills</h2>
                <p>HTML5, CSS3, JavaScriptに加え、GitHub Pagesを用いた高速なサイト公開を得意としています。</p>
            </article>
            <article>
                <h2>Project</h2>
                <p>このサイトは、初めてのGitHubベースでのWebサイト制作プロジェクトです。シンプルかつモダンを追求しています。</p>
            </article>
            <article>
                <h2>Vision</h2>
                <p>Webの力で情報を整理し、世界中の誰にでも伝わるデザインを届けることを目指しています。</p>
            </article>
        </div>
    </div>

    <footer>
        &copy; 2026 Hyodo. Created with Gemini.
    </footer>

</body>
</html>
