<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hyodo | Next Gen Portfolio</title>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0f19;
            --accent: #00d4ff;
            --card: #161b22;
        }
        body {
            margin: 0; background: var(--bg); color: white;
            font-family: 'Inter', sans-serif; overflow-x: hidden;
        }
        /* ヒーローセクションをさらに豪華に */
        .hero {
            height: 100vh; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            background: radial-gradient(circle at 50% 50%, #1e293b 0%, #0b0f19 100%);
        }
        .hero h1 {
            font-size: clamp(2rem, 8vw, 5rem);
            text-transform: uppercase; letter-spacing: 5px;
            margin: 0; transition: 0.5s;
        }
        .hero h1:hover { color: var(--accent); text-shadow: 0 0 20px var(--accent); }

        .container { max-width: 1000px; margin: 0 auto; padding: 50px 20px; }
        
        /* カードのデザイン */
        .card-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }
        article {
            background: var(--card); padding: 40px; border-radius: 20px;
            border: 1px solid #30363d; cursor: pointer;
        }
        
        /* ボタンのアニメーション */
        .btn {
            padding: 15px 40px; background: transparent; color: var(--accent);
            border: 2px solid var(--accent); border-radius: 30px;
            text-decoration: none; font-weight: bold; transition: 0.3s;
            margin-top: 30px;
        }
        .btn:hover { background: var(--accent); color: var(--bg); box-shadow: 0 0 30px var(--accent); }
    </style>
</head>
<body>

    <section class="hero">
        <h1 data-aos="zoom-in">HYODO</h1>
        <p data-aos="fade-up" data-aos-delay="300">Creative Web Developer & Innovator</p>
        <a href="#about" class="btn" data-aos="fade-up" data-aos-delay="600">Explore More</a>
    </section>

    <div class="container" id="about">
        <div class="card-grid">
            <article data-aos="fade-right">
                <h2>Innovative Tech</h2>
                <p>最新のAI技術とGitHubを活用し、次世代のWeb体験を構築します。</p>
            </article>
            <article data-aos="fade-left" data-aos-delay="200">
                <h2>Fast & Secure</h2>
                <p>GitHub Pagesによる高速な配信と、堅牢なセキュリティを両立。</p>
            </article>
        </div>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 1000, once: true }); // アニメーションの速度と1回のみ実行の設定
    </script>
</body>
</html>
